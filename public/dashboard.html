          <h3 id="totalReports">0</h3>

          <h3 id="pendingReports">0</h3>
          <p>Pending</p>
        </div>
      </div>

      <h2 class="section-title">Issue Locations</h2>
      <div id="map" style="height: 300px; width: 500px; margin-bottom:20px; border-radius:10px;"></div>

  <script src="/app.js"></script>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {

      const reportsEl = document.getElementById("reports");
      const messageEl = document.getElementById("message");

      // MAP
      const map = L.map('map', {
        zoomControl: false,
        scrollWheelZoom: false,
        doubleClickZoom: false,
        boxZoom: false,
        keyboard: false,
        dragging: true
      }).setView([20.5937, 78.9629], 5);

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
      }).addTo(map);

      // DELETE
      async function deleteReport(id) {
        try {
          const response = await fetch("/api/reports/" + id, {
            method: "DELETE"
          });

          const data = await response.json();
          if (!response.ok) throw new Error(data.message);

          alert("Report deleted!");
          loadMyReports();
        } catch (error) {
          alert(error.message);
        }
      }

      // STATS
      function updateStats(myReports) {
        document.getElementById("totalReports").textContent = myReports.length;
        document.getElementById("resolvedReports").textContent =
          myReports.filter(r => r.status === "Resolved").length;
        document.getElementById("pendingReports").textContent =
          myReports.filter(r => r.status !== "Resolved").length;
      }

      // LOAD REPORTS
      async function loadMyReports() {
        reportsEl.innerHTML = "";
        messageEl.textContent = "";
        messageEl.className = "";

        const user = JSON.parse(localStorage.getItem("user") || "null");

        if (!user || !user.id) {
          window.location.href = "/login.html";
          return;
        }

        if (user.role === "admin") {
          window.location.href = "/admin.html";
          return;
        }

        try {
          const response = await fetch("/api/reports");
          const data = await response.json();

          if (!response.ok) throw new Error(data.message);

          const myReports = data.filter((r) => {
            const ownerId =
              r.user && typeof r.user === "object" ? r.user._id : r.user;
            return String(ownerId) === String(user.id);
          });

          updateStats(myReports);

          // CLEAR OLD MARKERS
          map.eachLayer((layer) => {
            if (layer instanceof L.CircleMarker) {
              map.removeLayer(layer);
            }
          });

          if (myReports.length === 0) {
            messageEl.textContent = "No reports submitted yet.";
            return;
          }

          myReports.forEach((report) => {

            const lat = report.location.coordinates[1];
            const lng = report.location.coordinates[0];

            // MAP MARKERS
            let color =
              report.status === "Resolved" ? "green" :
                report.status === "In Progress" ? "orange" : "red";

            L.circleMarker([lat, lng], { color, radius: 8 })
              .addTo(map)
              .bindPopup(`<b>${report.title}</b><br>${report.category}`);

            // CARD
            const card = document.createElement("div");
            card.className = "card";

            card.innerHTML = `
              <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3>${report.title}</h3>

                <span style="
                  padding:6px 14px;
                  border-radius:20px;
                  font-size:13px;
                  font-weight:500;
                  background:${report.status === "Resolved" ? "#10b981" :
                report.status === "In Progress" ? "#f59e0b" : "#ef4444"
              };
                  color:white;
                ">
                  ${report.status}
                </span>
              </div>

              <div style="display:flex; gap:20px; margin-top:15px; align-items:flex-start;">

                ${report.image
                ? `<img src="${report.image}" style="
                        width:160px;
                        height:120px;
                        object-fit:cover;
                        border-radius:10px;
                      ">`
                : ""
              }

                <div style="flex:1;">
                  <p><strong>Category:</strong> ${report.category}</p>
                  <p style="margin-top:5px;">${report.description}</p>

                  <p class="location" style="margin-top:10px;">
                    📍 Loading address...
                  </p>
                  <p><strong>Assigned To:</strong> ${report.assignedTo || "Unassigned"}</p>

                  <div style="margin-top:10px;">
                  <strong>Updates:</strong>

                      ${report.updates && report.updates.length
                ? report.updates.map(u => `
          <p style="font-size:12px; margin:2px 0;">
            🔔 ${u.message}
          </p>
        `).join("")
                : `<p style="font-size:12px;">No updates yet</p>`
              }
            </div>

                  <button style="
                    margin-top:10px;
                    padding:6px 12px;
                    border:none;
                    border-radius:6px;
                    background:#ef4444;
                    color:white;
                    cursor:pointer;
                  ">
                    Delete
                  </button>
                </div>

              </div>
            `;

            // LOCATION
            const locationEl = card.querySelector(".location");

            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`)
              .then(res => res.json())
              .then(data => {
                locationEl.textContent = "📍 " + (data.display_name || "Address not found");
              })
              .catch(() => {
                locationEl.textContent = "📍 Unable to fetch address";
              });

            // DELETE BUTTON
            const deleteBtn = card.querySelector("button");
            deleteBtn.onclick = () => deleteReport(report._id);

            reportsEl.appendChild(card);
          });

          // AUTO ZOOM
          const first = myReports[0];
          map.setView([
            first.location.coordinates[1],
            first.location.coordinates[0]
          ], 12);

        } catch (error) {
          messageEl.className = "error";
          messageEl.textContent = error.message;
        }
      }

      loadMyReports();
    });
  </script>
</body>

</html>
