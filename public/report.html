<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Submit Report</title>
  <link rel="stylesheet" href="/styles.css" />
</head>

<body>
  <div class="container">
    <aside class="sidebar">
      <h2>Civic App</h2>
      <a href="#" onclick="goToDashboard(); return false;">Dashboard</a>
      <a href="/report.html">Submit Report</a>
      <button type="button" onclick="logout()">Logout</button>
    </aside>

    <main class="main">
      <h2>Submit Issue</h2>

      <div class="form-container" style="margin:0;">
        <form id="reportForm">
          <input type="text" id="title" placeholder="Title" required />
          <textarea id="description" placeholder="Description" required></textarea>
          <input type="text" id="category" placeholder="Category" required />

          <input type="file" id="image" accept="image/*" />

          <input type="text" id="latitude" placeholder="Latitude" readonly required />
          <input type="text" id="longitude" placeholder="Longitude" readonly required />

          <button type="button" id="locationBtn" class="location-btn">Use Current Location</button>
          <button type="submit" class="location-btn" style="background-color: rgb(8, 84, 59);">Submit Report</button>

          <p id="message"></p>
        </form>
      </div>
    </main>
  </div>

  <script src="/app.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const session = JSON.parse(localStorage.getItem("user") || "null");
      if (!session || !session.id) {
        window.location.href = "/login.html";
        return;
      }
      if (session.role === "admin") {
        window.location.href = "/admin.html";
        return;
      }

      const messageEl = document.getElementById("message");
      const locationBtn = document.getElementById("locationBtn");
      const reportForm = document.getElementById("reportForm");

      locationBtn.addEventListener("click", () => {
        messageEl.textContent = "";
        messageEl.className = "";

        if (!navigator.geolocation) {
          alert("Geolocation not supported");
          return;
        }

        navigator.geolocation.getCurrentPosition(
          (position) => {
            console.log(position.coords);
            document.getElementById("latitude").value = position.coords.latitude;
            document.getElementById("longitude").value = position.coords.longitude;
            messageEl.className = "success";
            messageEl.textContent = "Location captured.";
          },
          (error) => {
            alert("Location error: " + error.message);
          }
        );
      });

      reportForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        messageEl.textContent = "";
        messageEl.className = "";

        const user = JSON.parse(localStorage.getItem("user") || "null");
        if (!user?.id) {
          messageEl.className = "error";
          messageEl.textContent = "You must be logged in to submit a report.";
          return;
        }

        const latVal = document.getElementById("latitude").value;
        const lngVal = document.getElementById("longitude").value;
        console.log("[submit] lat/lng:", latVal, lngVal, "userId:", user?.id);

        const formData = new FormData();
        formData.append("title", document.getElementById("title").value);
        formData.append("description", document.getElementById("description").value);
        formData.append("category", document.getElementById("category").value);
        formData.append("latitude", latVal);
        formData.append("longitude", lngVal);
        formData.append("userId", user?.id);

        const imageFile = document.getElementById("image").files[0];
        if (imageFile) {
          formData.append("image", imageFile);
        }

        try {
          const response = await fetch("/api/reports", {
            method: "POST",
            body: formData
          });

          const data = await response.json();

          if (!response.ok) throw new Error(data.message || "Failed to submit report");

          messageEl.className = "success";
          messageEl.textContent = "Report submitted successfully.";
          reportForm.reset();
        } catch (error) {
          messageEl.className = "error";
          messageEl.textContent = error.message;
        }
      });
    });
  </script>
</body>

</html>
