<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel</title>
  <link rel="stylesheet" href="/styles.css" />

  <style>
    /* 🔥 ADMIN CARD DESIGN */

    .admin-card {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(10px);
      padding: 20px;
      border-radius: 14px;
      margin-bottom: 20px;
      color: white;
    }

    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .admin-header h3 {
      font-size: 20px;
    }

    .status {
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
    }

    .status.Submitted { background: #ef4444; }
    .status.In-Progress { background: #f59e0b; }
    .status.Resolved { background: #10b981; }

    .admin-body {
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }

    .admin-image img {
      width: 180px;
      height: 130px;
      object-fit: cover;
      border-radius: 10px;
    }

    .admin-details {
      flex: 1;
    }

    .admin-details p {
      margin: 6px 0;
    }

    .location {
      font-size: 13px;
      color: #cbd5e1;
      margin-top: 8px;
    }

    .admin-actions {
      margin-top: 10px;
      display: flex;
      gap: 10px;
      align-items: center;
    }
  </style>
</head>

<body class="dashboard-page">
  <div class="container">
    <aside class="sidebar">
      <h2>Civic App</h2>
      <a href="#" onclick="goToDashboard(); return false;">Dashboard</a>
      <a href="/report.html">Submit Report</a>
      <button type="button" onclick="logout()">Logout</button>
    </aside>

    <main class="main">
      <h2 class="page-title">All Reports</h2>
      <div id="reports"></div>
      <p id="message"></p>
    </main>
  </div>

  <script src="/app.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {

      const session = JSON.parse(localStorage.getItem("user") || "null");

      if (!session || !session.id) {
        window.location.href = "/login.html";
        return;
      }

      if (session.role !== "admin") {
        window.location.href = "/dashboard.html";
        return;
      }

      const reportsEl = document.getElementById("reports");
      const messageEl = document.getElementById("message");

      async function updateStatus(reportId, status) {
        try {
          const response = await fetch("/api/reports/" + reportId + "/status", {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ status })
          });

          const data = await response.json();
          if (!response.ok) throw new Error(data.message);

          loadAllReports();
        } catch (error) {
          messageEl.className = "error";
          messageEl.textContent = error.message;
        }
      }

      async function loadAllReports() {
        reportsEl.innerHTML = "";
        messageEl.textContent = "";
        messageEl.className = "";

        try {
          const response = await fetch("/api/reports");
          const data = await response.json();

          if (!response.ok) throw new Error(data.message);

          if (data.length === 0) {
            messageEl.textContent = "No reports available.";
            return;
          }

          data.forEach((report) => {

            const card = document.createElement("div");
            card.className = "admin-card";

            const userLabel =
              report.user && typeof report.user === "object"
                ? report.user.name + " (" + report.user.email + ")"
                : report.user || "Unknown";

            const statusClass = report.status.replace(" ", "-");

            // 🔥 STRUCTURED CARD
            card.innerHTML = `
              <div class="admin-header">
                <h3>${report.title}</h3>
                <span class="status ${statusClass}">
                  ${report.status}
                </span>
              </div>

              <div class="admin-body">

                <div class="admin-image">
                  ${report.image ? `<img src="${report.image}" />` : ""}
                </div>

                <div class="admin-details">
                  <p><strong>User:</strong> ${userLabel}</p>
                  <p><strong>Category:</strong> ${report.category}</p>
                  <p>${report.description}</p>
                  <p class="location">📍 Loading address...</p>
                </div>

              </div>
            `;

            // 🔥 LOCATION FETCH
            const locationEl = card.querySelector(".location");

            const lat = report.location.coordinates[1];
            const lng = report.location.coordinates[0];

            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`)
              .then(res => res.json())
              .then(data => {
                locationEl.textContent = "📍 " + (data.display_name || "Address not found");
              })
              .catch(() => {
                locationEl.textContent = "📍 Unable to fetch address";
              });

            // 🔽 STATUS CONTROLS
            const select = document.createElement("select");

            ["Submitted", "In Progress", "Resolved"].forEach((status) => {
              const option = document.createElement("option");
              option.value = status;
              option.textContent = status;
              if (status === report.status) option.selected = true;
              select.appendChild(option);
            });

            const updateBtn = document.createElement("button");
            updateBtn.className = "update-btn";
            updateBtn.textContent = "Update Status";

            updateBtn.onclick = () => {
              updateStatus(report._id, select.value);
            };

            const actions = document.createElement("div");
            actions.className = "admin-actions";

            actions.appendChild(select);
            actions.appendChild(updateBtn);

            card.appendChild(actions);

            reportsEl.appendChild(card);
          });

        } catch (error) {
          messageEl.className = "error";
          messageEl.textContent = error.message;
        }
      }

      loadAllReports();
    });
  </script>
</body>

</html>
