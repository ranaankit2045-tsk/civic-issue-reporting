<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel</title>
  <link rel="stylesheet" href="/styles.css" />

  <style>
    .admin-card {
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(10px);
      padding: 20px;
      border-radius: 14px;
      margin-bottom: 20px;
      color: white;
    }

    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .status {
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
    }

    .status.Submitted { background: #ef4444; }
    .status.In-Progress { background: #f59e0b; }
    .status.Resolved { background: #10b981; }

    .admin-body {
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }

    .admin-image img {
      width: 180px;
      height: 130px;
      object-fit: cover;
      border-radius: 10px;
    }

    .admin-details { flex: 1; }
    .admin-details p { margin: 6px 0; }

    .location {
      font-size: 13px;
      color: #cbd5e1;
    }

    .admin-actions {
      margin-top: 10px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .update-btn {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    .update-btn:hover {
      background: #2563eb;
    }
  </style>
</head>

<body class="dashboard-page">
  <div class="container">

    <aside class="sidebar">
      <h2>Civic App</h2>
      <a href="#" onclick="goToDashboard(); return false;">Dashboard</a>
      <a href="/report.html">Submit Report</a>
      <button onclick="logout()">Logout</button>
    </aside>

    <main class="main">
      <h2 class="page-title">All Reports</h2>
      <div id="reports"></div>
      <p id="message"></p>
    </main>

  </div>

  <script src="/app.js"></script>

  <script>
    let ORGS = [];

    async function loadOrgs() {
      const res = await fetch("/api/reports/orgs");
      ORGS = await res.json();
    }

    document.addEventListener("DOMContentLoaded", () => {

      const session = JSON.parse(localStorage.getItem("user") || "null");

      if (!session?.id) return window.location.href = "/login.html";
      if (session.role !== "admin") return window.location.href = "/dashboard.html";

      const reportsEl = document.getElementById("reports");
      const messageEl = document.getElementById("message");

      async function updateStatus(reportId, status, card) {
        try {
          const res = await fetch(`/api/reports/${reportId}/status`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ status })
          });

          const data = await res.json();
          if (!res.ok) throw new Error(data.message);

          const statusEl = card.querySelector(".status");
          statusEl.textContent = status;
          statusEl.className = "status " + status.replace(" ", "-");

        } catch (err) {
          messageEl.className = "error";
          messageEl.textContent = err.message;
        }
      }

      async function assignReport(reportId, value, card, btn) {
        try {
          btn.disabled = true;

          const res = await fetch(`/api/reports/${reportId}/assign`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ assignedTo: value })
          });

          const data = await res.json();
          if (!res.ok) throw new Error(data.message);

          const text = card.querySelector(".assigned-text");
          text.textContent = data.report.assignedTo?.name || "Unassigned";

        } catch (err) {
          messageEl.className = "error";
          messageEl.textContent = err.message;
        } finally {
          btn.disabled = false;
        }
      }

      async function loadAllReports() {
        await loadOrgs(); // 🔥 important

        reportsEl.innerHTML = "";
        messageEl.textContent = "";

        try {
          const res = await fetch("/api/reports");
          const data = await res.json();

          if (!res.ok) throw new Error(data.message);

          if (!data.length) {
            messageEl.textContent = "No reports available.";
            return;
          }

          data.forEach(report => {

            const card = document.createElement("div");
            card.className = "admin-card";

            const userLabel =
              typeof report.user === "object"
                ? `${report.user.name} (${report.user.email})`
                : report.user || "Unknown";

            const statusClass = report.status.replace(" ", "-");

            card.innerHTML = `
              <div class="admin-header">
                <h3>${report.title}</h3>
                <span class="status ${statusClass}">
                  ${report.status}
                </span>
              </div>

              <div class="admin-body">
                <div class="admin-image">
                  ${report.image ? `<img src="${report.image}" />` : ""}
                </div>

                <div class="admin-details">
                  <p><strong>User:</strong> ${userLabel}</p>
                  <p><strong>Category:</strong> ${report.category}</p>
                  <p>${report.description}</p>
                  <p class="location">📍 Loading...</p>

                  <p>
                    <strong>Assigned To:</strong>
                    <span class="assigned-text">
                      ${report.assignedTo?.name || "Unassigned"}
                    </span>
                  </p>
                </div>
              </div>
            `;

            // 📍 LOCATION
            const locEl = card.querySelector(".location");
            const lat = report.location.coordinates[1];
            const lng = report.location.coordinates[0];

            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`)
              .then(r => r.json())
              .then(d => locEl.textContent = "📍 " + (d.display_name || "Not found"))
              .catch(() => locEl.textContent = "📍 Error");

            // 🔽 STATUS
            const statusSelect = document.createElement("select");

            ["Submitted", "In Progress", "Resolved"].forEach(s => {
              const opt = document.createElement("option");
              opt.value = s;
              opt.textContent = s;
              if (s === report.status) opt.selected = true;
              statusSelect.appendChild(opt);
            });

            const statusBtn = document.createElement("button");
            statusBtn.textContent = "Update";
            statusBtn.className = "update-btn";

            statusBtn.onclick = () =>
              updateStatus(report._id, statusSelect.value, card);

            // 🔽 ASSIGN
            const assignSelect = document.createElement("select");

            const defaultOpt = document.createElement("option");
            defaultOpt.value = "";
            defaultOpt.textContent = "Unassigned";
            assignSelect.appendChild(defaultOpt);

            ORGS.forEach(org => {
              const opt = document.createElement("option");
              opt.value = org._id;
              opt.textContent = org.name;

              if (report.assignedTo && report.assignedTo._id === org._id) {
                opt.selected = true;
              }

              assignSelect.appendChild(opt);
            });

            const assignBtn = document.createElement("button");
            assignBtn.textContent = "Assign";
            assignBtn.className = "update-btn";

            assignBtn.onclick = () =>
              assignReport(report._id, assignSelect.value, card, assignBtn);

            const actions = document.createElement("div");
            actions.className = "admin-actions";

            actions.appendChild(statusSelect);
            actions.appendChild(statusBtn);
            actions.appendChild(assignSelect);
            actions.appendChild(assignBtn);

            card.appendChild(actions);
            reportsEl.appendChild(card);
          });

        } catch (err) {
          messageEl.className = "error";
          messageEl.textContent = err.message;
        }
      }

      loadAllReports();
    });
  </script>

</body>
</html>
