<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Register</title>
  <link rel="stylesheet" href="/styles.css" />
</head>

<body class="auth-page">

  <div class="login-container">
    <h2>Register</h2>

    <form id="registerForm">
      <input type="text" id="name" placeholder="Name" required />
      <input type="email" id="email" placeholder="Email" required />
      <input type="password" id="password" placeholder="Password" required />

      <!-- 🔥 NEW ROLE SELECT -->
      <select id="role">
        <option value="user">User</option>
        <option value="organization">Organization</option>
      </select>

      <!-- 🔥 ONLY FOR ORG -->
      <input type="text" id="orgName" placeholder="Organization Name" style="display:none;" />

      <button type="submit" class="login-btn">Register</button>
      <p id="message"></p>
    </form>

    <p style="text-align:center; margin-top:10px;">
      Already have an account? <a href="/login.html">Login</a>
    </p>
  </div>

  <script>
    const registerForm = document.getElementById("registerForm");
    const messageEl = document.getElementById("message");

    const roleSelect = document.getElementById("role");
    const orgInput = document.getElementById("orgName");

    // 🔥 Show org field only if needed
    roleSelect.addEventListener("change", () => {
      if (roleSelect.value === "organization") {
        orgInput.style.display = "block";
      } else {
        orgInput.style.display = "none";
      }
    });

    registerForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      const body = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        password: document.getElementById("password").value,
        role: roleSelect.value,
        organizationName: orgInput.value
      };

      try {
        const res = await fetch("/api/auth/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body)
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.message);

        messageEl.className = "success";
        messageEl.textContent = "Registered successfully! Redirecting...";

        setTimeout(() => {
          window.location.href = "/login.html";
        }, 1200);

      } catch (err) {
        messageEl.className = "error";
        messageEl.textContent = err.message;
      }
    });
  </script>

</body>
</html>
